<template>
    <lightning-card>

        <div class="section upcoming">

            <div class="section-header">
                <h2>Upcoming Appointments</h2>
                <span>{upcoming.length}</span>
            </div>

            <template if:true={upcoming.length}>
                <template for:each={upcoming} for:item="row">

                    <div key={row.Id} class="card upcoming-card">

                        <div class="card-header">
                            <a href={row.appointmentUrl} target="_blank">
                                {row.Name}
                            </a>
                            <span class="badge upcoming-badge">Upcoming</span>
                        </div>

                        <p><strong>Doctor: </strong> {row.doctorName}</p>
                        <p class="date">
                            <lightning-formatted-date-time value={row.Appointment_Date__c} year="numeric" month="short"
                                day="2-digit" hour="2-digit" minute="2-digit" hour12="true">
                            </lightning-formatted-date-time>
                        </p>


                    </div>

                </template>
            </template>

            <template if:false={upcoming.length}>
                <p class="empty">No upcoming appointments</p>
            </template>

        </div>

        <div class="divider"></div>

        <div class="section">

            <div class="section-header">
                <h2>Completed Appointments</h2>
                <span>{completed.length}</span>
            </div>

            <template if:true={completed.length}>
                <template for:each={completed} for:item="row">

                    <div key={row.Id} class="card">

                        <div class="card-header">
                            <a href={row.appointmentUrl} target="_blank">
                                {row.Name}
                            </a>
                            <span class="badge completed-badge">Completed</span>
                        </div>

                        <p><strong>Doctor: </strong> {row.doctorName}</p>
						
						<p class="notes">
                            <strong>Visit Reason: </strong> {row.Visit_Reason__c}
                        </p>

							<p class="notes"><strong>Medical Notes: </strong>{row.Medical_Notes__c}</p>
                    </div>

                </template>
            </template>

        </div>

    </lightning-card>
</template>
